shadow = false;
shadow-radius = 8;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude = [ "_GTK_FRAME_EXTENTS@:c", "class_g = 'albert'", "name = 'zoom'" ]

fading = true;
fade-in-step = 0.1;
fade-out-step = 0.1;
vsync = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
glx-no-stencil = true;
use-damage = true;
log-level = "warn";
wintypes:
{
  tooltip = { shadow = true; opacity = 0.9; focus = true; };
};
